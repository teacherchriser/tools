<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Gear 2 SNES</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="game"></div>

    <script>
        EJS_player = "#game";
        EJS_core = "snes";
        EJS_gameName = "Super Mario Bros 3";
        EJS_color = "#0064ff";

        // IMPORTANTE: ruta correcta al ROM
        EJS_gameUrl = "./TopGear2.zip";

        // CDN del emulador
        EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

        // Inicia automáticamente
        EJS_startOnLoaded = true;
    </script>

    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
