<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Child Voice Generator</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
background:white;
max-width:600px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
background:#3b82f6;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

audio{
margin-top:20px;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h2>Child Voice Generator</h2>

<p>Write text and generate a child-like voice.</p>

<textarea id="textInput" placeholder="Type your sentence here..."></textarea>

<br>

<button onclick="generateVoice()">Generate Voice</button>
<button onclick="downloadMP3()">Download MP3</button>

<br>

<audio id="audioPlayer" controls></audio>

</div>

<script>

let audioBlob;

async function generateVoice(){

const text = document.getElementById("textInput").value;

const response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/97babee92fd1fe829b2021b3daf3a6ed8f4e46b311c61ee29d69c67e760862db",{

method:"POST",

headers:{
"Content-Type":"application/json",
"xi-api-key":"sk_d4301298c359d032d2ba6e6c63ca7727a4be695726f2b7be"
},

body:JSON.stringify({
text:text,
model_id:"eleven_multilingual_v2",
voice_settings:{
stability:0.3,
similarity_boost:0.8
}
})

});

audioBlob = await response.blob();

const audioURL = URL.createObjectURL(audioBlob);

document.getElementById("audioPlayer").src = audioURL;

}

function downloadMP3(){

if(!audioBlob){
alert("Generate the voice first.");
return;
}

const url = URL.createObjectURL(audioBlob);

const a = document.createElement("a");

a.href = url;

a.download = "voice.mp3";

a.click();

}

</script>

</body>
</html>
