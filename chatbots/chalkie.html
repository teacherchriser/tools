<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://chalkboardlp.github.io/img/favicon.png" type="image/x-icon">
<title>English Tutor Bot</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap');
</style>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:#f1f5f9;
    font-family: "Play", sans-serif;
}

#chat-container{
    width:95%;
    max-width:850px;
    height:90vh;
    margin:20px auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

#chat-header{
    background:#009169;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}

#chat-header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

#chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    scroll-behavior:smooth;
    background:#f8fafc;
}

.message-row{
    display:flex;
    margin-bottom:15px;
}

.message-row.user{
    justify-content:flex-end;
}

.message{
    max-width:75%;
    padding:14px 18px;
    border-radius:20px;
    line-height:1.5;
    font-size:15px;
    animation:fadeIn 0.2s ease-in-out;
}

.user .message{
    background:#009169;
    color:white;
    border-bottom-right-radius:5px;
}

.bot .message{
    background:white;
    color:#222;
    border:1px solid #ddd;
    border-bottom-left-radius:5px;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    margin-right:10px;
}

#typing{
    display:none;
    margin-bottom:15px;
    color:#666;
    font-style:italic;
    padding-left:10px;
}

#input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
    background:white;
}

#user-input{
    flex:1;
    padding:14px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
    outline:none;
	font-family: "Play", sans-serif;
}

#user-input:focus{
    border-color:#009169;
}

button{
    margin-left:10px;
    padding:14px 20px;
    border:none;
    border-radius:12px;
    background:#009169;
    color:white;
    font-size:15px;
	font-family: "Play", sans-serif;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1DD893;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(5px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    #chat-container{
        width:100%;
        height:100vh;
        margin:0;
        border-radius:0;
    }

    .message{
        max-width:90%;
    }

    #chat-header{
        font-size:18px;
    }
	.message h1,
	.message h2,
	.message h3{
    margin-top:10px;
    color:#009169;
	}

	.message p{
    margin:8px 0;
	}

	.message ul{
    padding-left:20px;
	}

	.message strong{
    color:#111;
	}
}

</style>
</head>

<body>

<div id="chat-container">

    <div id="chat-header">
        <img src="Chalkie_04_S.png">
        Virtual Academic Assistant
    </div>

    <div id="chat-box">

        <div class="message-row bot">
            <img class="avatar" src="Chalkie_04_S.png">

            <div class="message">
                Hello 👋<br><br>
                My name is Chalkie. I am Professor Christian English Academic Assistant.<br>
                Ask me about grammar, vocabulary, pronunciation, academic English, culture or digital resources.
            </div>
        </div>

        <div id="typing">Tutor is typing...</div>

    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>


async function sendMessage(){

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const typing = document.getElementById("typing");

    const userMessage = input.value.trim();

    if(!userMessage) return;

    chatBox.innerHTML += `
        <div class="message-row user">
            <div class="message">${userMessage}</div>
        </div>
    `;

    input.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    typing.style.display = "block";

    try{

        const response = await fetch(
    `https://summer-lab-c0ee.theenglishblackboard.workers.dev/`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                contents:[
                    {
                        parts:[
                            {
                                text:
`You are a friendly English tutor for university students in Colombia and your name is Chalkie.

Your role is to help students improve their English grammar, vocabulary, pronunciation, writing, cultural understanding and recommended digital resources for education.

Explain grammar clearly using simple examples.
Keep answers concise and educational.
Use short explanations unless the student asks for more detail.

Help students understand:
- English grammar
- Vocabulary in context
- Pronunciation and phonetics
- Academic English
- Cultural aspects of English-speaking countries
- Intercultural communication
- Differences between cultures in education and communication
- Digital resources for teaching and learning purposes.

Encourage students to think critically and respectfully about cultural diversity.

Answer only educational and English-learning related topics.

When appropriate:
1. Explain the concept
2. Give brief examples
Do not unnecessarily continue conversations.
Do not always ask follow-up questions.
Keep responses focused and concise.
Adapt your explanations for students between A1 and B1 English levels.
Explain grammar clearly using simple examples.
Finish all explanations clearly.
Use short explanations unless the student asks for more detail.

Student question:
${userMessage}`
                            }
                        ]
                    }
                ],

                generationConfig:{
                    temperature:0.7,
                    maxOutputTokens:400
                }

            })
        });

        const data = await response.json();

        console.log(data);

        const botReply =
        data.candidates?.[0]?.content?.parts?.[0]?.text
        || data.error?.message
        || "The tutor is currently busy. Please try again in a moment.";

        typing.style.display = "none";

        chatBox.innerHTML += `
            <div class="message-row bot">

                <img class="avatar" src="Chalkie_04_S.png">

                <div class="message">
					${marked.parse(botReply)}
				</div>

            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    }catch(error){

        typing.style.display = "none";

        chatBox.innerHTML += `
            <div class="message-row bot">

                <img class="avatar" src="Chalkie_04_S.png">

                <div class="message">
                    The tutor is currently busy. Please try again in a moment.
                </div>

            </div>
        `;

        console.error(error);
    }
}

document.getElementById("user-input")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

<script> 
document.oncontextmenu = function() { 
    return false; 
};
</script>

</body>
</html>
